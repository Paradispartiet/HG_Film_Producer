name: Apply production forecast integration

on:
  push:
    branches:
      - agent/forecast-production-overruns

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/forecast-production-overruns

      - name: Patch production forecast integration
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              text = file_path.read_text()
              if old not in text:
                  raise SystemExit(f"Expected source block not found in {path}: {old[:120]!r}")
              file_path.write_text(text.replace(old, new, 1))

          panel = "src/ui/components/ScenarioProductionBriefPanel.tsx"
          replace_once(
              panel,
              '} from "../../core/productionCaseConstraints";\nimport {\n  applyProductionCaseOutcomeToReport,',
              '} from "../../core/productionCaseConstraints";\nimport { getProductionCaseChoiceConstraintForecast } from "../../core/productionCaseConstraintForecast";\nimport {\n  applyProductionCaseOutcomeToReport,',
          )
          replace_once(
              panel,
              '''                  {mission.choices.map((choice) => {\n                    const impact = getProductionCaseChoiceConstraintImpact(choice);\n                    return (''',
              '''                  {mission.choices.map((choice) => {\n                    const impact = getProductionCaseChoiceConstraintImpact(choice);\n                    const forecast = getProductionCaseChoiceConstraintForecast(\n                      missions,\n                      progressEntry,\n                      mission.id,\n                      choice.id,\n                    );\n                    return (''',
          )
          replace_once(
              panel,
              'className={choice.id === selectedChoiceId ? "scenario-choice-button scenario-choice-button--selected" : "scenario-choice-button"}',
              '''className={[\n                          "scenario-choice-button",\n                          choice.id === selectedChoiceId ? "scenario-choice-button--selected" : "",\n                          forecast ? `scenario-choice-button--risk-${forecast.projected.status}` : "",\n                        ].filter(Boolean).join(" ")}''',
          )
          replace_once(
              panel,
              '''                        <small>\n                          {impact.label} · Budget {formatConstraintDelta(impact.budgetDelta)} · Time {formatConstraintDelta(impact.scheduleDelta)} · Control {formatConstraintDelta(impact.creativeControlDelta)}\n                        </small>''',
              '''                        <small>\n                          {impact.label} · Budget {formatConstraintDelta(impact.budgetDelta)} · Time {formatConstraintDelta(impact.scheduleDelta)} · Control {formatConstraintDelta(impact.creativeControlDelta)}\n                        </small>\n                        {forecast ? (\n                          <>\n                            <small className="scenario-choice-projection">\n                              After choice · Budget {forecast.projected.budgetRemaining}/{forecast.projected.startingBudget} · Time {forecast.projected.scheduleRemaining}/{forecast.projected.startingSchedule} · Control {formatConstraintDelta(forecast.projected.creativeControl)}\n                            </small>\n                            {forecast.projected.status !== "on_track" ? (\n                              <small className="scenario-choice-risk">\n                                {forecast.label} · {forecast.description}\n                              </small>\n                            ) : null}\n                          </>\n                        ) : null}''',
          )

          main = "src/ui/main.tsx"
          replace_once(
              main,
              'import "./productionCaseConstraints.css";\nimport "./productionCaseOutcome.css";\n',
              'import "./productionCaseConstraints.css";\nimport "./productionCaseConstraintForecast.css";\nimport "./productionCaseOutcome.css";\n',
          )

          doc = "docs/PRODUCTION_CASE_CONSTRAINT_LEDGER.md"
          replace_once(
              doc,
              "## Producer outcome\n",
              '''## Pre-decision forecast\n\nEvery choice now previews the production position it would create immediately after that phase:\n\n- remaining budget;\n- remaining time;\n- accumulated creative control;\n- low-margin or overrun status;\n- the Producer or Assistant result cap caused by an overrun.\n\nThe forecast only counts earlier phases and the current candidate choice. Stored choices in later phases do not distort an earlier decision, and switching an existing choice replaces its previous impact instead of counting it twice. Risky choices remain available because an intentional production gamble can be a valid player decision.\n\n## Producer outcome\n''',
          )
          PY

          rm .github/workflows/apply-production-forecast-patch.yml

      - name: Commit integrated production forecasts
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ui/components/ScenarioProductionBriefPanel.tsx \
            src/ui/main.tsx \
            docs/PRODUCTION_CASE_CONSTRAINT_LEDGER.md \
            .github/workflows/apply-production-forecast-patch.yml
          git commit -m "Integrate production choice forecasts"
          git push origin HEAD:agent/forecast-production-overruns

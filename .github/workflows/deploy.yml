name: Deploy HG Film Producer to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: hg-film-producer-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm install

      - name: Build UI
        run: npm run build:ui

      - name: Verify Pages artifact
        shell: bash
        run: |
          set -euxo pipefail

          echo "Contents of dist:"
          find dist -maxdepth 3 -type f -print | sort

          echo "Generated dist/index.html:"
          cat dist/index.html

          if grep -Fq '/src/ui/main.tsx' dist/index.html; then
            echo "::error file=dist/index.html::Vite source entrypoint is still present in the Pages artifact."
            exit 1
          fi

          if ! grep -Fq '/HG_Film_Producer/assets/' dist/index.html; then
            echo "::error file=dist/index.html::Expected repository-prefixed Vite asset path was not found."
            exit 1
          fi

          echo "Verified dist/index.html uses the built HG_Film_Producer asset bundle."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Revert production simulation

on:
  push:
    branches:
      - agent/restore-film-learning-focus

permissions:
  contents: write

jobs:
  revert:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/restore-film-learning-focus
          fetch-depth: 0

      - name: Revert simulation merges
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git revert --no-edit -m 1 3223442af2fab63fdf69345c53717e80b1207ea2
          git revert --no-edit -m 1 7723f3a050f8c4ec865b7ee172386f5a5a6b00da
          git revert --no-edit -m 1 6be7761abec7129fdb5301832d58c4e76ff74cb7
          git revert --no-edit -m 1 dc485617c411b0a5355a3f03126be22beaa89478
          rm .github/workflows/revert-production-simulation.yml
          git add .github/workflows/revert-production-simulation.yml
          git commit -m "Remove temporary rollback workflow"
          git push origin HEAD:agent/restore-film-learning-focus

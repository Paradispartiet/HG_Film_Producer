name: Move early cinema registry to core

on:
  push:
    branches:
      - early-cinema-expansion-58

permissions:
  contents: write

jobs:
  refactor:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: early-cinema-expansion-58
      - name: Move registry and remove UI type dependency
        shell: bash
        run: |
          git mv src/ui/data/earlyCinemaExpansion.ts src/core/earlyCinemaExpansion.ts
          cat > /tmp/historical-film-scenario-type.txt <<'EOF'
          export type HistoricalFilmScenario = {
            readonly id: string;
            readonly status: string;
            readonly source: {
              readonly list_id: string;
              readonly position: number;
              readonly imdb_id: string;
              readonly url: string;
            };
            readonly film: {
              readonly title: string;
              readonly original_title: string;
              readonly year: number;
              readonly title_type: string;
              readonly runtime_mins: number;
              readonly directors: readonly string[];
              readonly genres: readonly string[];
              readonly genre_keys: readonly string[];
              readonly imdb_rating: number;
              readonly user_rating: number;
            };
            readonly scenario_type: string;
            readonly production_challenge: string;
            readonly required_choices_seed: Record<string, readonly string[]>;
            readonly phases: readonly {
              readonly id: string;
              readonly label: string;
              readonly player_task: string;
            }[];
            readonly learning_goals_seed: readonly string[];
            readonly manual_enrichment_needed: readonly string[];
          };

          EOF
          python - <<'PY'
          from pathlib import Path
          path = Path('src/core/earlyCinemaExpansion.ts')
          text = path.read_text(encoding='utf-8')
          old = 'import type { FilmScenarioSeed } from "./filmScenarios";\n\n'
          if old not in text:
              raise SystemExit('UI type import anchor not found')
          type_block = Path('/tmp/historical-film-scenario-type.txt').read_text(encoding='utf-8')
          text = text.replace(old, type_block, 1)
          text = text.replace('scenario: FilmScenarioSeed,', 'scenario: HistoricalFilmScenario,')
          text = text.replace('baseScenarios: readonly FilmScenarioSeed[],', 'baseScenarios: readonly HistoricalFilmScenario[],')
          text = text.replace('): readonly FilmScenarioSeed[] {', '): readonly HistoricalFilmScenario[] {')
          text = text.replace('): FilmScenarioSeed {', '): HistoricalFilmScenario {')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Remove temporary files and commit
        shell: bash
        run: |
          rm .github/workflows/move-early-cinema-core.yml
          rm -f .github/early-cinema-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Move early cinema registry into core"
          git push origin HEAD:early-cinema-expansion-58

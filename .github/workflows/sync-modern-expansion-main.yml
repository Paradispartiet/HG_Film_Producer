name: Sync modern expansion with main

on:
  push:
    branches:
      - agent/modern-indie-asian-prize-expansion-27

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/modern-indie-asian-prize-expansion-27
          fetch-depth: 0
      - name: Merge current main and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-edit origin/main
          rm .github/workflows/sync-modern-expansion-main.yml
          git add -A
          git commit -m "Remove temporary branch sync workflow"
          git push origin HEAD:agent/modern-indie-asian-prize-expansion-27
